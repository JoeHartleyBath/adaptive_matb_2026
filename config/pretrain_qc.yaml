# MWL pretraining dataset (VR-TSST EEG) — QC exclusions
#
# Participants excluded from continuous EEG export, LOSO-CV,
# and all downstream analysis.  Update this file when new exclusion
# decisions are made; do not hardcode PIDs in scripts.
#
# Reason codes
# ------------
#   EEG_QUALITY        : amplitude outlier, artefact drift, or impedance failure
#   ARTIFACT_SEPARABLE : high AUC driven by amplitude/alpha artefact, not workload
#   CLASS_IMBALANCE    : fewer condition blocks than expected (< 4)
#
# Method (2026-03-13 revision)
# ----------------------------
# Within-participant AUC recomputed with:
#   - Non-overlapping 2 s epochs (step=2.0 s) to eliminate train/test leakage
#   - RepeatedStratifiedKFold (5 folds × 10 repeats, seed 42) for stability
#   - LogisticRegression(C=0.01, balanced) on Welch PSD features, per-PP z-scored
# Full audit: scripts/_qc_audit_all_participants.py → results/qc_audit.csv
#
# Previous NO_SIGNAL exclusions (P04, P06, P09, P20, P23, P33, P35, P39,
# P44, P46) were based on overlapping-epoch AUC and are no longer applied.
# Under corrected (non-overlapping) CV, no participant meets a principled
# below-chance criterion.  See notes below.
#
# Current set: 6 excluded → 41 effective included (P14 excluded at data
# load due to missing/corrupt XDF, not listed here).

excluded_participants:

  # --- Tier 1: Clear excludes (catastrophic data quality) ---

  P21:
    reason: EEG_QUALITY
    detail: >
      RMS 6.8× cohort median, condRatio 4.49×, alphaRatio 32.1×, drift.
      AUC 0.962±0.026 is classifier learning the artefact, not workload.

  P34:
    reason: EEG_QUALITY
    detail: >
      RMS 28.6× cohort median — catastrophically noisy.
      AUC 0.466±0.059 (below chance, no recoverable signal).

  P37:
    reason: EEG_QUALITY
    detail: >
      RMS 8.2× cohort median, condRatio 12.64×, alphaRatio 83.9×, drift.
      AUC 0.639±0.068 inflated by artefact asymmetry.

  # --- Tier 2: Artefact-driven separability ---

  P43:
    reason: ARTIFACT_SEPARABLE
    detail: >
      condRatio 3.58×, drift. AUC 0.850±0.045 is high but likely reflects
      amplitude asymmetry between conditions rather than neural workload.

  P45:
    reason: ARTIFACT_SEPARABLE
    detail: >
      condRatio 2.82×, alphaRatio 5.9×, drift. AUC 0.912±0.039 —
      separability driven by alpha/amplitude artefact.

  P27:
    reason: ARTIFACT_SEPARABLE
    detail: >
      condRatio 2.84×, drift. AUC 0.716±0.053 may be inflated by
      amplitude asymmetry between conditions.

  P16:
    reason: CLASS_IMBALANCE
    detail: >
      Only 891 task/forest windows vs 1188 for all other participants, and
      0 fixation blocks (vs 114). Incomplete session — missing condition
      data makes calibration normalisation (ADR-0004) unreliable.

